spring:
  application:
    name: hrpm-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/hrpm?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:hrpm}
    password: ${DB_PASSWORD:hrpm_dev_password}
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  jackson:
    time-zone: UTC
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
management:
  endpoints:
    web:
      exposure:
        include: health,info
app:
  time-zone: ${APP_TIME_ZONE:Asia/Shanghai}
  security:
    jwt-signing-key: ${JWT_SIGNING_KEY:local-development-signing-key-change-me}
    access-token-ttl: ${ACCESS_TOKEN_TTL:PT15M}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:P14D}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
