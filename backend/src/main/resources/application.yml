spring:
  application:
    name: hrpm-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/hrpm?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:hrpm}
    password: ${DB_PASSWORD:hrpm_dev_password}
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration
  jackson:
    time-zone: UTC
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
management:
  endpoints:
    web:
      exposure:
        include: health,info
app:
  time-zone: ${APP_TIME_ZONE:Asia/Shanghai}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
