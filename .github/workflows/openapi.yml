name: OpenAPI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  generated-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Start local infrastructure
        run: docker compose up -d mysql redis minio
      - name: Start API
        working-directory: backend
        run: mvn -q spring-boot:run > ../backend.log 2>&1 &
      - name: Verify generated OpenAPI contract
        run: |
          for attempt in {1..30}; do
            curl --fail --silent http://localhost:8080/api/v1/v3/api-docs.yaml -o openapi.generated.yaml && break
            sleep 2
          done
          test -s openapi.generated.yaml
          grep -q 'openapi:' openapi.generated.yaml
          grep -q '/performance/metrics:' openapi.generated.yaml
      - name: Upload generated contract
        uses: actions/upload-artifact@v4
        with:
          name: hrpm-openapi
          path: openapi.generated.yaml
