services:
  mysql:
    image: mysql:8.4
    container_name: hrpm-mysql
    environment:
      MYSQL_DATABASE: hrpm
      MYSQL_USER: hrpm
      MYSQL_PASSWORD: hrpm_dev_password
      MYSQL_ROOT_PASSWORD: root_dev_password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command: --default-time-zone=+00:00 --character-set-server=utf8mb4 --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_dev_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: hrpm-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: hrpm-minio
    environment:
      MINIO_ROOT_USER: hrpm_minio
      MINIO_ROOT_PASSWORD: hrpm_minio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

volumes:
  mysql-data:
  redis-data:
  minio-data:
