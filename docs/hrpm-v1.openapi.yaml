openapi: 3.1.0
info:
  title: HRPM API
  version: 1.0.0
  description: API contract. Resource-specific fields and state rules are defined in 04-接口设计.md.
servers:
  - url: /api/v1
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      security: []
      operationId: authLogin
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/LoginRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '400': {$ref: '#/components/responses/Error'}}
  /auth/refresh:
    post:
      security: []
      operationId: authRefresh
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/RefreshRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '401': {$ref: '#/components/responses/Error'}}
  /auth/logout:
    post:
      operationId: authLogout
      responses: {'200': {$ref: '#/components/responses/Success'}}
  /me:
    get:
      operationId: getCurrentUser
      responses: {'200': {$ref: '#/components/responses/Success'}}
  /me/permissions:
    get:
      operationId: getCurrentUserPermissions
      responses: {'200': {$ref: '#/components/responses/Success'}}
  /me/menus:
    get:
      operationId: getCurrentUserMenus
      responses: {'200': {$ref: '#/components/responses/Success'}}
  /system/roles:
    get:
      operationId: listSystemRoles
      responses: {'200': {$ref: '#/components/responses/Success'}, '403': {$ref: '#/components/responses/Error'}}
  /system/users:
    get:
      operationId: listSystemUsers
      parameters: [{$ref: '#/components/parameters/Page'}, {$ref: '#/components/parameters/PageSize'}]
      responses: {'200': {$ref: '#/components/responses/PageSuccess'}, '403': {$ref: '#/components/responses/Error'}}
  /system/users/{id}/roles:
    put:
      operationId: replaceUserRoles
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdateUserRolesRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '403': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}
  /departments:
    get:
      operationId: listDepartmentTree
      responses: {'200': {description: Department tree, content: {application/json: {schema: {$ref: '#/components/schemas/DepartmentTreeResponse'}}}}, '403': {$ref: '#/components/responses/Error'}}
  /positions:
    get:
      operationId: listPositions
      responses: {'200': {description: Position list, content: {application/json: {schema: {$ref: '#/components/schemas/PositionListResponse'}}}}}
    post:
      operationId: createPosition
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CreatePositionRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}}
  /positions/{id}:
    patch:
      operationId: updatePosition
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdatePositionRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}}
  /ranks:
    get:
      operationId: listRanks
      responses: {'200': {description: Rank list, content: {application/json: {schema: {$ref: '#/components/schemas/RankListResponse'}}}}}
    post:
      operationId: createRank
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CreateRankRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}}
  /ranks/{id}:
    patch:
      operationId: updateRank
      parameters: [{name: id, in: path, required: true, schema: {type: string}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdateRankRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}}
  /work-calendars:
    get:
      operationId: getWorkCalendarByYear
      parameters: [{name: year, in: query, required: true, schema: {type: integer, minimum: 2000, maximum: 2100}}]
      responses: {'200': {$ref: '#/components/responses/Success'}, '403': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}}
    post:
      operationId: createWorkCalendar
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CreateWorkCalendarRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '400': {$ref: '#/components/responses/Error'}, '403': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}
  /work-calendars/{id}:
    put:
      operationId: updateWorkCalendar
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdateWorkCalendarRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '400': {$ref: '#/components/responses/Error'}, '403': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}
  /leave-balances:
    get:
      operationId: listMyLeaveBalances
      responses: {'200': {description: Current employee leave balances, content: {application/json: {schema: {$ref: '#/components/schemas/LeaveBalanceListResponse'}}}}, '403': {$ref: '#/components/responses/Error'}, '422': {$ref: '#/components/responses/Error'}}
  /leave-balances/employees/{employeeId}:
    get:
      operationId: listEmployeeLeaveBalances
      parameters: [{name: employeeId, in: path, required: true, schema: {type: string, format: int64}}]
      responses: {'200': {description: Employee leave balances, content: {application/json: {schema: {$ref: '#/components/schemas/LeaveBalanceListResponse'}}}}, '403': {$ref: '#/components/responses/Error'}}
  /leave-balances/{id}/changes:
    get:
      operationId: listLeaveBalanceChanges
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      responses: {'200': {description: Immutable leave balance change ledger, content: {application/json: {schema: {$ref: '#/components/schemas/LeaveBalanceChangeListResponse'}}}}, '403': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}}
  /leave-balances/{id}/adjust:
    post:
      operationId: adjustLeaveBalance
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/AdjustLeaveBalanceRequest'}}}}
      responses: {'200': {description: Adjusted leave balance, content: {application/json: {schema: {$ref: '#/components/schemas/LeaveBalanceResponse'}}}}, '400': {$ref: '#/components/responses/Error'}, '403': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}
  /overtime-requests:
    get:
      operationId: listMyOvertimeRequests
      responses: {'200': {description: Current employee overtime requests, content: {application/json: {schema: {$ref: '#/components/schemas/OvertimeRequestListResponse'}}}}, '403': {$ref: '#/components/responses/Error'}}
    post:
      operationId: createOvertimeRequestDraft
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CreateOvertimeRequest'}}}}
      responses: {'200': {description: Overtime draft, content: {application/json: {schema: {$ref: '#/components/schemas/OvertimeRequestResponse'}}}}, '400': {$ref: '#/components/responses/Error'}, '403': {$ref: '#/components/responses/Error'}}
  /overtime-requests/{id}/submit:
    post:
      operationId: submitOvertimeRequest
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/VersionCommand'}}}}
      responses: {'200': {description: Overtime request in progress, content: {application/json: {schema: {$ref: '#/components/schemas/OvertimeRequestResponse'}}}}, '400': {$ref: '#/components/responses/Error'}, '403': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}, '422': {$ref: '#/components/responses/Error'}}
  /overtime-requests/{id}/cancel:
    post:
      operationId: cancelOvertimeRequest
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/VersionCommand'}}}}
      responses: {'200': {description: Cancelled overtime request, content: {application/json: {schema: {$ref: '#/components/schemas/OvertimeRequestResponse'}}}}, '400': {$ref: '#/components/responses/Error'}, '403': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}
  /attendance/monthly-summaries:
    get:
      operationId: listAttendanceMonthlySummaries
      parameters: [{name: month, in: query, required: true, schema: {type: string, pattern: '^\\d{4}-(0[1-9]|1[0-2])$'}}, {name: departmentId, in: query, schema: {type: string, format: int64}}, {name: employeeId, in: query, schema: {type: string, format: int64}}]
      responses: {'200': {description: Attendance monthly summary snapshots, content: {application/json: {schema: {$ref: '#/components/schemas/AttendanceMonthlySummaryListResponse'}}}}, '400': {$ref: '#/components/responses/Error'}, '403': {$ref: '#/components/responses/Error'}}
  /attendance/monthly-summaries/rebuild:
    post:
      operationId: rebuildAttendanceMonthlySummaries
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/RebuildAttendanceMonthlySummaryRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '400': {$ref: '#/components/responses/Error'}, '403': {$ref: '#/components/responses/Error'}}
  /employees:
    get:
      operationId: listEmployees
      parameters:
        - {$ref: '#/components/parameters/Page'}
        - {$ref: '#/components/parameters/PageSize'}
        - {name: keyword, in: query, schema: {type: string}}
        - {name: departmentId, in: query, schema: {type: string}}
        - {name: positionId, in: query, schema: {type: string}}
        - {name: employmentStatus, in: query, schema: {type: string}}
      responses: {'200': {description: Employee page, content: {application/json: {schema: {$ref: '#/components/schemas/EmployeePageResponse'}}}}}
    post:
      operationId: createEmployee
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CreateEmployeeRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '400': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}
  /employees/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: string}}]
    get:
      operationId: getEmployee
      responses: {'200': {description: Employee detail, content: {application/json: {schema: {$ref: '#/components/schemas/EmployeeDetailResponse'}}}}, '404': {$ref: '#/components/responses/Error'}}
    patch:
      operationId: updateEmployee
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdateEmployeeRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '400': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}
  /leave-types:
    get:
      operationId: listLeaveTypes
      parameters: [{name: includeInactive, in: query, schema: {type: boolean, default: false}}]
      responses: {'200': {$ref: '#/components/responses/Success'}, '403': {$ref: '#/components/responses/Error'}}
    post:
      operationId: createLeaveType
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CreateLeaveTypeRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '400': {$ref: '#/components/responses/Error'}, '403': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}
  /leave-types/{id}:
    patch:
      operationId: updateLeaveType
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdateLeaveTypeRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '400': {$ref: '#/components/responses/Error'}, '403': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}
  /leave-types/{id}/disable:
    post:
      operationId: disableLeaveType
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/DisableLeaveTypeRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '403': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}
  /{resource}:
    parameters: [{name: resource, in: path, required: true, schema: {type: string, enum: [users, roles, menus, dictionaries, departments, positions, ranks, employees, personnel-changes, contracts, leave-types, work-calendars, leave-requests, overtime-requests, goals, performance/metrics, performance/schemes, performance/cycles, todos, exports]}}]
    get:
      operationId: listResource
      parameters: [{$ref: '#/components/parameters/Page'}, {$ref: '#/components/parameters/PageSize'}, {$ref: '#/components/parameters/SortBy'}, {$ref: '#/components/parameters/SortOrder'}]
      responses: {'200': {$ref: '#/components/responses/PageSuccess'}, '403': {$ref: '#/components/responses/Error'}}
    post:
      operationId: createResource
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/ResourceCommand'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}, '422': {$ref: '#/components/responses/Error'}}
  /{resource}/{id}:
    parameters:
      - {name: resource, in: path, required: true, schema: {type: string}}
      - {name: id, in: path, required: true, schema: {type: string, format: int64}}
    get:
      operationId: getResource
      responses: {'200': {$ref: '#/components/responses/Success'}, '404': {$ref: '#/components/responses/Error'}}
    patch:
      operationId: patchResource
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/VersionedResourceCommand'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}}
    delete:
      operationId: deleteResource
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}]
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}}
  /workflow/tasks:
    get:
      operationId: listWorkflowTasks
      parameters: [{$ref: '#/components/parameters/Page'}, {$ref: '#/components/parameters/PageSize'}]
      responses: {'200': {$ref: '#/components/responses/PageSuccess'}}
  /workflow/templates:
    get:
      operationId: listWorkflowTemplates
      responses: {'200': {$ref: '#/components/responses/Success'}, '403': {$ref: '#/components/responses/Error'}}
    post:
      operationId: createWorkflowTemplate
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/CreateWorkflowTemplateRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '400': {$ref: '#/components/responses/Error'}, '403': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}
  /workflow/templates/{id}:
    parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
    get:
      operationId: getWorkflowTemplate
      responses: {'200': {$ref: '#/components/responses/Success'}, '403': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}}
    put:
      operationId: updateWorkflowTemplate
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UpdateWorkflowTemplateRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '400': {$ref: '#/components/responses/Error'}, '403': {$ref: '#/components/responses/Error'}, '404': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}}
  /workflow/tasks/{id}/approve:
    post:
      operationId: approveWorkflowTask
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/WorkflowActionCommand'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}, '422': {$ref: '#/components/responses/Error'}}
  /workflow/tasks/{id}/reject:
    post:
      operationId: rejectWorkflowTask
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/WorkflowActionCommand'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}, '422': {$ref: '#/components/responses/Error'}}
  /workflow/tasks/{id}/return:
    post:
      operationId: returnWorkflowTask
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/WorkflowActionCommand'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}, '422': {$ref: '#/components/responses/Error'}}
  /workflow/tasks/{id}/transfer:
    post:
      operationId: transferWorkflowTask
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/WorkflowActionCommand'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '403': {$ref: '#/components/responses/Error'}, '409': {$ref: '#/components/responses/Error'}, '422': {$ref: '#/components/responses/Error'}}
  /workflow/tasks/instances/{id}:
    get:
      operationId: getWorkflowInstance
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      responses: {'200': {$ref: '#/components/responses/Success'}, '404': {$ref: '#/components/responses/Error'}}
  /workflow/tasks/instances/{id}/withdraw:
    post:
      operationId: withdrawWorkflowInstance
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/WorkflowInstanceActionCommand'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}, '422': {$ref: '#/components/responses/Error'}}
  /performance/tasks/{id}/{action}:
    post:
      operationId: actPerformanceTask
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: int64}}
        - {name: action, in: path, required: true, schema: {type: string, enum: [self-assessment, manager-score, calibrate]}}
        - {$ref: '#/components/parameters/IdempotencyKey'}
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/PerformanceActionCommand'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}, '422': {$ref: '#/components/responses/Error'}}
  /performance/cycles/{id}/{action}:
    post:
      operationId: actPerformanceCycle
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: int64}}
        - {name: action, in: path, required: true, schema: {type: string, enum: [start, publish, archive]}}
        - {$ref: '#/components/parameters/IdempotencyKey'}
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/VersionedResourceCommand'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '409': {$ref: '#/components/responses/Error'}}
  /files/upload-requests:
    post:
      operationId: createUploadRequest
      parameters: [{$ref: '#/components/parameters/IdempotencyKey'}]
      requestBody: {required: true, content: {application/json: {schema: {$ref: '#/components/schemas/UploadRequest'}}}}
      responses: {'200': {$ref: '#/components/responses/Success'}, '422': {$ref: '#/components/responses/Error'}}
  /files/{id}/download-url:
    get:
      operationId: getDownloadUrl
      parameters: [{name: id, in: path, required: true, schema: {type: string, format: int64}}]
      responses: {'200': {$ref: '#/components/responses/Success'}, '403': {$ref: '#/components/responses/Error'}}
components:
  securitySchemes:
    bearerAuth: {type: http, scheme: bearer, bearerFormat: JWT}
  parameters:
    Page: {name: page, in: query, schema: {type: integer, minimum: 1, default: 1}}
    PageSize: {name: pageSize, in: query, schema: {type: integer, minimum: 1, maximum: 100, default: 20}}
    SortBy: {name: sortBy, in: query, schema: {type: string}}
    SortOrder: {name: sortOrder, in: query, schema: {type: string, enum: [asc, desc]}}
    IdempotencyKey: {name: Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 16, maxLength: 128}}
  responses:
    Success: {description: Successful response, content: {application/json: {schema: {$ref: '#/components/schemas/ApiResponse'}}}}
    PageSuccess: {description: Successful paged response, content: {application/json: {schema: {$ref: '#/components/schemas/PageResponse'}}}}
    Error: {description: Error response, content: {application/json: {schema: {$ref: '#/components/schemas/ApiResponse'}}}}
  schemas:
    ApiResponse:
      type: object
      required: [code, message, traceId]
      properties: {code: {type: string}, message: {type: string}, data: {}, traceId: {type: string}}
    PageResponse:
      allOf:
        - {$ref: '#/components/schemas/ApiResponse'}
        - {type: object, properties: {data: {type: object, required: [records, total, page, pageSize], properties: {records: {type: array, items: {}}, total: {type: integer}, page: {type: integer}, pageSize: {type: integer}}}}}
    LoginRequest: {type: object, required: [username, password], properties: {username: {type: string}, password: {type: string, format: password}}}
    RefreshRequest: {type: object, required: [refreshToken], properties: {refreshToken: {type: string}}}
    UpdateUserRolesRequest: {type: object, required: [roleIds, version], properties: {roleIds: {type: array, items: {type: string}}, version: {type: string}}}
    WorkCalendarDay: {type: object, required: [workDate, workday, workHours], properties: {workDate: {type: string, format: date}, workday: {type: boolean}, workHours: {type: number, minimum: 0}, holidayName: {type: string}}}
    CreateWorkCalendarRequest: {type: object, required: [calendarYear, name, timeZone, status, days], properties: {calendarYear: {type: integer, minimum: 2000, maximum: 2100}, name: {type: string}, timeZone: {type: string}, status: {type: string, enum: [ACTIVE, INACTIVE]}, days: {type: array, items: {$ref: '#/components/schemas/WorkCalendarDay'}}}}
    UpdateWorkCalendarRequest: {type: object, required: [name, timeZone, status, days, version], properties: {name: {type: string}, timeZone: {type: string}, status: {type: string, enum: [ACTIVE, INACTIVE]}, days: {type: array, items: {$ref: '#/components/schemas/WorkCalendarDay'}}, version: {type: string}}}
    LeaveBalance: {type: object, required: [id, employeeId, balanceType, balanceYear, availableHours, frozenHours, version], properties: {id: {type: string, format: int64}, employeeId: {type: string, format: int64}, balanceType: {type: string}, balanceYear: {type: integer}, availableHours: {type: number}, frozenHours: {type: number}, version: {type: string}}}
    LeaveBalanceChange: {type: object, required: [id, balanceType, deltaHours, beforeHours, afterHours, sourceType, reason, createdTime], properties: {id: {type: string, format: int64}, balanceType: {type: string}, deltaHours: {type: number}, beforeHours: {type: number}, afterHours: {type: number}, sourceType: {type: string, enum: [MANUAL_ADJUSTMENT, LEAVE_APPROVAL, LEAVE_CANCELLATION, TIME_OFF, OVERTIME_CANCELLATION]}, reason: {type: string}, createdBy: {type: [string, 'null'], format: int64}, createdTime: {type: string, format: date-time}}}
    AdjustLeaveBalanceRequest: {type: object, required: [deltaHours, direction, reason, version], properties: {deltaHours: {type: number, exclusiveMinimum: 0}, direction: {type: string, enum: [INCREASE, DECREASE]}, reason: {type: string, minLength: 1, maxLength: 500}, version: {type: string}}}
    CreateLeaveTypeRequest: {type: object, required: [code, name, deductBalance, minUnitHours], properties: {code: {type: string, maxLength: 64}, name: {type: string, maxLength: 128}, deductBalance: {type: boolean}, annualQuota: {type: [number, 'null'], exclusiveMinimum: 0}, minUnitHours: {type: number, exclusiveMinimum: 0}}}
